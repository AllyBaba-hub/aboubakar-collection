<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login page for Aboubakar's Collection inventory management.">
    <meta name="robots" content="noindex,nofollow">
    <title>"Aboubakar's Collection | Admin Login</title>
    <style>
        :root {
            --bg: #1f2a37;
            --card: #ffffff;
            --text: #2c3e50;
            --accent: #25d366;
            --accent-dark: #128c7e;
            --danger: #b00020;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #1f2a37, #2d3f55);
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            width: min(420px, 100%);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(0,0,0,0.35);
        }

        h1 {
            margin: 0 0 8px;
            color: var(--text);
            font-size: 1.4rem;
        }

        p {
            margin: 0 0 16px;
            color: #546273;
            font-size: 0.95rem;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            color: var(--text);
            font-weight: 600;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ccd5de;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
        }

        button:hover { background: var(--accent-dark); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .message {
            margin-top: 12px;
            min-height: 20px;
            font-size: 0.92rem;
            color: #2d4052;
        }

        .message.error { color: var(--danger); }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Admin Login</h1>
        <p>Sign in with your Supabase Auth admin account.</p>

        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required>

            <button id="loginBtn" type="submit">Login</button>
            <div id="message" class="message"></div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
         const SUPABASE_URL = 'https://tquzycsemanwmymlwkiy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxdXp5Y3NlbWFud215bWx3a2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODYwNDEsImV4cCI6MjA4NzE2MjA0MX0.1rqcsediRJClY6Q2uN9oyZFkffo2h87654-9FMDzgHY';
    
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const messageEl = document.getElementById("message");

        function setMessage(text, isError = false) {
            messageEl.textContent = text;
            messageEl.classList.toggle("error", isError);
        }

        async function checkExistingSession() {
            const { data, error } = await supabaseClient.auth.getSession();
            if (error) {
                setMessage("Session check failed.", true);
                return;
            }

            if (data.session) {
                window.location.href = "admin.html";
            }
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage("");
            loginBtn.disabled = true;
            loginBtn.textContent = "Signing in...";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    setMessage(error.message || "Login failed.", true);
                    return;
                }

                setMessage("Login successful. Redirecting...");
                window.location.href = "admin.html";
            } catch (err) {
                console.error(err);
                setMessage("Unexpected login error.", true);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Login";
            }
        });

        checkExistingSession();
    </script>
</body>
</html>
